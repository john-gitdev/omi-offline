# E2E Flow: Device Management — connected device info and actions
# Tests: connected device info, firmware update, SD card sync, disconnect/unpair

name: device-management
description: Connected device management — device info, battery, firmware update, SD card sync, disconnect
covers:
  - app/lib/pages/settings/device_settings.dart
prerequisites:
  - auth_ready  # App launched, home (recordings) screen visible.
  - ble_on  # Bluetooth enabled. Emulators/simulators have no BLE — requires physical device.
  - omi_device_connected  # Omi hardware powered on within BLE range. Physical device only.
setup:
  requires: omi_device_connected

steps:
  - name: Open settings drawer
    press: { type: gesture, hint: "settings gear icon top-right" }

  - name: Open Device Settings
    note: "Only visible when Omi device is connected via BLE"
    press: { type: gesture, hint: "Device Settings row" }
    screenshot: device-settings

  - name: Verify device info
    assert:
      interactive_count: { min: 5 }
    note: >
      Device Info: Name (copy), ID (copy), Firmware (tap for update), SD Card Sync.
      Hardware Info: Revision, Model, Manufacturer (all copyable).
      Customization: Double Tap action, LED Brightness (0-100%), Mic Gain (0-8).
      Actions: Disconnect Device, Unpair Device.
    screenshot: device-info

  - name: Scroll to actions
    scroll: down
    screenshot: device-actions

  - name: Back to settings
    back: true

  - name: Close settings
    back: true
