# E2E Flow: Recordings — home screen recording list and player
# Tests: recordings list, date grouping, playback

name: recordings
description: Home recordings screen — recording list grouped by date, tap to play, waveform player
covers:
  - app/lib/pages/recordings/recordings_page.dart
  - app/lib/pages/recordings/recording_player_page.dart
prerequisites:
  - auth_ready  # App launched, home (recordings) screen visible.
setup: normal

steps:
  - name: Verify recordings page
    assert:
      interactive_count: { min: 1 }
    note: >
      RecordingsPage: recordings grouped by date (today, yesterday, older).
      Each row shows duration and timestamp. Empty state if no recordings synced yet.
    screenshot: recordings-home

  - name: Open a recording (if any exist)
    press: { type: gesture, hint: "first recording row" }
    screenshot: recording-player
    note: >
      RecordingPlayerPage: waveform, play/pause button, scrubber, duration.
      Back button top-left returns to recordings list.

  - name: Play recording
    press: { type: gesture, hint: "play/pause button" }
    screenshot: recording-playing

  - name: Back to recordings
    back: true
