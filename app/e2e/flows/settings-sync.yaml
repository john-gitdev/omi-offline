# E2E Flow: Settings → Sync Device — data synchronization
# Tests: sync page navigation, local storage, recordings, fast transfer

name: settings-sync
description: Settings → Sync Device — view sync status, local storage, recordings list, fast transfer settings
covers:
  - app/lib/pages/settings/settings_drawer.dart
  - app/lib/pages/settings/sync_page.dart
prerequisites:
  - auth_ready  # App launched, home (recordings) screen visible.
setup: normal

steps:
  - name: Open settings drawer
    press: { type: gesture, hint: "settings gear icon top-right" }

  - name: Open Sync Device
    press: { type: gesture, hint: "Sync Device row in settings" }
    screenshot: sync-page

  - name: Verify sync page
    assert:
      interactive_count: { min: 3 }
    note: >
      SyncPage shows: sync status, local storage info,
      recordings list, fast transfer settings, private cloud sync option.

  - name: Scroll sync page
    scroll: down
    screenshot: sync-scrolled

  - name: Back to settings
    back: true

  - name: Close settings
    back: true
