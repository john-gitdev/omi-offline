# E2E Flow: Settings → Device Settings — Omi device configuration
# Tests: device info, LED brightness, mic gain, double tap action

name: settings-device
description: Settings → Device Settings — view device info, adjust LED brightness and mic gain, configure double tap action
covers:
  - app/lib/pages/settings/settings_drawer.dart
  - app/lib/pages/settings/device_settings.dart
prerequisites:
  - auth_ready  # App launched, home (recordings) screen visible.
  - ble_on  # Bluetooth enabled. Emulators/simulators have no BLE — requires physical device.
  - omi_device_connected  # Omi hardware powered on within BLE range. Physical device only.
setup:
  requires: omi_device_connected

steps:
  - name: Open settings drawer
    press: { type: gesture, hint: "settings gear icon top-right" }

  - name: Open Device Settings
    note: "Only visible when Omi device is connected via BLE"
    press: { type: gesture, hint: "Device Settings row" }
    screenshot: device-settings

  - name: Verify device settings
    assert:
      interactive_count: { min: 5 }
    note: >
      Device Info: Name (copy), ID (copy), Firmware (tap for update), SD Card Sync.
      Hardware Info: Revision, Model, Manufacturer (all copyable).
      Customization: Double Tap action (dropdown), LED Brightness (slider 0-100%), Mic Gain (slider 0-8).
      Actions: Disconnect Device, Unpair Device.

  - name: Open double tap action picker
    press: { type: gesture, hint: "Double Tap row" }
    screenshot: double-tap-picker

  - name: Close picker
    back: true

  - name: Adjust LED brightness
    press: { type: gesture, hint: "LED Brightness row" }
    screenshot: led-brightness

  - name: Close brightness
    back: true

  - name: Adjust mic gain
    press: { type: gesture, hint: "Mic Gain row" }
    screenshot: mic-gain

  - name: Close mic gain
    back: true

  - name: Back to settings
    back: true

  - name: Close settings
    back: true
